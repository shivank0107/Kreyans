<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | Kreyans</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div id="header"></div>

    <main>

        <section class="product-details-section">

            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <i class="fa-solid fa-chevron-right"></i>

                <a href="products.html">Products</a>
                <i class="fa-solid fa-chevron-right"></i>

                <span id="breadcrumb-product">
                    Product
                </span>
            </div>


            <div
                id="product-details-container"
                class="product-details-container"
            >
                <!-- Product added with JavaScript -->
            </div>


            <div
                id="product-not-found"
                class="product-not-found"
            >

                <i class="fa-solid fa-box-open"></i>

                <h2>Product not found</h2>

                <p>
                    The product you're looking for is unavailable.
                </p>

                <a
                    href="products.html"
                    class="btn btn-primary"
                >
                    Continue Shopping
                </a>

            </div>

        </section>


        <!-- Related Products -->

        <section
            id="related-products-section"
            class="section"
        >

            <div class="section-header">

                <div>
                    <span class="section-label">
                        You May Also Like
                    </span>

                    <h2>Related Products</h2>
                </div>

                <a href="products.html">
                    View All
                    <i class="fa-solid fa-arrow-right"></i>
                </a>

            </div>


            <div
                id="related-products"
                class="product-grid"
            >
            </div>

        </section>

    </main>


    <div id="footer"></div>


    <script src="js/components.js"></script>
    <script src="js/products.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product-details.js"></script>

</body>
</html>
